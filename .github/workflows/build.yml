name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Install Buildozer
      run: |
        sudo apt update
        sudo apt install -y python3-pip build-essential git
        pip3 install buildozer cython

    - name: Build APK
      run: |
        buildozer android debug
